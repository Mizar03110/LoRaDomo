sentence=LoRa home automation library with MQTT gateway and web UI.
paragraph=Provides LoRaNode and LoRaGateway classes for building a LoRa/MQTT home automation network. Features: automatic node registration, sensor value publishing, actuator callbacks, read callbacks, battery callback, WebSocket UI with board names, NVS persistence, multi-board support (Heltec V2/V3/V4, TTGO LoRa32 V1), debug mode.
category=Communication
